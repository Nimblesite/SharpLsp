<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGlow" cx="50%" cy="0%" r="65%" fx="50%" fy="0%">
      <stop offset="0%" stop-color="#00e676" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="#131313" stop-opacity="0"/>
    </radialGradient>

    <!-- Logo glow -->
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid line clip -->
    <clipPath id="mainClip">
      <rect width="1200" height="630"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#131313"/>

  <!-- Radial glow from top centre -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#mainClip)" opacity="0.045">
    <!-- Vertical lines -->
    <line x1="100" y1="0" x2="100" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="300" y1="0" x2="300" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="500" y1="0" x2="500" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="700" y1="0" x2="700" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="1100" y1="0" x2="1100" y2="630" stroke="#e5e2e1" stroke-width="1"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#e5e2e1" stroke-width="1"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#e5e2e1" stroke-width="1"/>
  </g>

  <!-- Top-left accent bar -->
  <rect x="0" y="0" width="4" height="630" fill="#00e676" opacity="0.6"/>

  <!-- Bottom accent line -->
  <rect x="0" y="616" width="1200" height="2" fill="#00e676" opacity="0.18"/>

  <!-- ── LOGO MARK ── -->
  <g transform="translate(80, 195)" filter="url(#logoGlow)">
    <polygon points="80,0 148,80 80,160 12,80" fill="none" stroke="#00e676" stroke-width="2.5" opacity="0.35"/>
    <polygon points="80,8 140,80 80,152 20,80" fill="#00e676"/>
    <polygon points="79,30 102,30 87,72 108,72 64,130 77,88 56,88" fill="#003918"/>
  </g>

  <!-- ── WORDMARK ── -->
  <text
    x="236"
    y="260"
    font-family="'Space Grotesk', 'Inter', -apple-system, sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-3"
  ><tspan fill="#e5e2e1">Sharp</tspan><tspan fill="#00e676">Lsp</tspan></text>

  <!-- ── TAGLINE ── -->
  <text
    x="236"
    y="316"
    font-family="'Inter', -apple-system, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#b7b5b4"
    letter-spacing="0.3"
  >Open-source C# + F# language server. Every editor.</text>

  <!-- ── DIVIDER ── -->
  <line x1="236" y1="356" x2="1120" y2="356" stroke="#262626" stroke-width="1"/>

  <!-- ── FEATURE PILLS ── -->
  <rect x="236" y="386" width="158" height="44" rx="6" fill="#1c1b1b" stroke="#3b4a3d" stroke-width="1.5"/>
  <text x="315" y="414" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#e5e2e1" text-anchor="middle">Roslyn</text>

  <rect x="408" y="386" width="228" height="44" rx="6" fill="#1c1b1b" stroke="#3b4a3d" stroke-width="1.5"/>
  <text x="522" y="414" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#e5e2e1" text-anchor="middle">FSharp.Compiler.Service</text>

  <rect x="650" y="386" width="150" height="44" rx="6" fill="#00e676" stroke="#00e676" stroke-width="1.5"/>
  <text x="725" y="414" font-family="'Inter', sans-serif" font-size="18" font-weight="700" fill="#003918" text-anchor="middle">MIT License</text>

  <rect x="814" y="386" width="100" height="44" rx="6" fill="#1c1b1b" stroke="#3b4a3d" stroke-width="1.5"/>
  <text x="864" y="414" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#e5e2e1" text-anchor="middle">Rust</text>

  <rect x="928" y="386" width="180" height="44" rx="6" fill="#1c1b1b" stroke="#3b4a3d" stroke-width="1.5"/>
  <text x="1018" y="414" font-family="'Inter', sans-serif" font-size="18" font-weight="600" fill="#e5e2e1" text-anchor="middle">VS Code · Zed</text>

  <!-- ── EDITOR ECOSYSTEM ROW ── -->
  <text x="236" y="484" font-family="'Inter', sans-serif" font-size="16" font-weight="500" fill="#859585" letter-spacing="0.5">Also: Neovim · Helix · Emacs · Rider — any LSP-compatible editor</text>

  <!-- ── URL BADGE (bottom right) ── -->
  <text
    x="1168"
    y="598"
    font-family="'Inter', sans-serif"
    font-size="18"
    font-weight="600"
    fill="#859585"
    text-anchor="end"
    letter-spacing="0.5"
  >sharplsp.dev</text>

  <!-- ── STATUS DOT + badge (top right, right-anchored) ── -->
  <text
    x="1170"
    y="57"
    font-family="'Inter', sans-serif"
    font-size="15"
    font-weight="600"
    fill="#b7b5b4"
    letter-spacing="0.4"
    text-anchor="end"
  >Open Source · MIT</text>
  <circle cx="1178" cy="52" r="4.5" fill="#00e676"/>
</svg>
