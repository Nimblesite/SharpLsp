<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" fill="none">
  <defs>
    <style>
      .bg { fill: #0d0d0d; }
      .panel { fill: #1a1a1a; stroke: #262626; stroke-width: 2; }
      .panel-light { fill: #f4f1f1; stroke: #e1dddd; stroke-width: 2; }
      .ink { fill: #e5e2e1; }
      .muted { fill: #bacbb9; }
      .dark-ink { fill: #1a1a1a; }
