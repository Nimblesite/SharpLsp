# agent-pmo:0b21609
name: CodeQL

# Static analysis for the supported codebase and GitHub Actions workflows.
# Keep this separate from ci.yml: CodeQL feeds GitHub code scanning alerts and
# needs security-events: write, while CI owns build/lint/test/coverage.
on:
  pull_request:
    branches: [ main ]
  push:
    # Run before EVERY release: scan the exact released SHA with the current
    # query set. The PR scan covers the diff and the weekly scan covers drift;
    # this covers the released commit itself so a release never ships code that
    # was last analyzed weeks ago. [GITHUB-CODE-SCANNING]
    tags: [ "v*" ]
  schedule:
    # Weekly, so newly-published CodeQL queries re-scan even without a push.
    - cron: "27 4 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: Medium
    timeout-minutes: 20
    # SharpLsp is public, so code scanning (SARIF upload) is free and this job
    # runs. The public-visibility gate stays as a safety net: if the repo is ever
    # flipped back to private without GitHub Advanced Security, the SARIF upload
    # would fail with "Code Security must be enabled for this repository" - the
    # gate skips the job cleanly instead, and self-re-enables once the repo is
    # public again. No follow-up edit needed. [GITHUB-CODE-SCANNING]
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: rust
            build-mode: none
          - language: csharp
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
