# agent-pmo:0b21609
name: CodeQL

# Static analysis for the supported codebase and GitHub Actions workflows.
# Keep this separate from ci.yml: CodeQL feeds GitHub code scanning alerts and
# needs security-events: write, while CI owns build/lint/test/coverage.
on:
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly, so newly-published CodeQL queries re-scan even without a push.
    - cron: "27 4 * * 1"
  # release.yml calls this with gate=true to scan the exact released SHA with the
  # current query set and BLOCK publishing on any High/Critical finding. The PR
  # scan covers the diff and the weekly scan covers query drift; the gated call
  # covers the released commit itself, so a release never ships code that was last
  # analyzed weeks ago — and now actually FAILS the release instead of just
  # filing alerts after the VSIX already shipped. [GITHUB-CODE-SCANNING]
  workflow_call:
    inputs:
      gate:
        description: >-
          When true, fail the job on any High/Critical finding so the calling
          workflow (release.yml) blocks publishing. PR and weekly runs leave this
          false and stay advisory (the PR check-failure threshold governs merges).
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ vars.UBUNTU_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    # SharpLsp is public, so code scanning (SARIF upload) is free and this job
    # runs. The public-visibility gate stays as a safety net: if the repo is ever
    # flipped back to private without GitHub Advanced Security, the SARIF upload
    # would fail with "Code Security must be enabled for this repository" - the
    # gate skips the job cleanly instead, and self-re-enables once the repo is
    # public again. No follow-up edit needed. [GITHUB-CODE-SCANNING]
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none
          - language: rust
            build-mode: none
          - language: csharp
            build-mode: none
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Query suite and test-code exclusions live in the shared config so the
          # PR, weekly, and gated release scans stay identical. [GITHUB-CODE-SCANNING]
          config-file: ./.github/codeql/codeql-config.yml
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
          # Drop the SARIF on disk so the gate step can read it. `upload` stays on
          # (default) so alerts still post to code scanning on every run.
          output: sarif-results
      # Release gate. `security-severity` is the 0-10 CVSS-style score CodeQL
      # attaches to each security rule; >= 7.0 == High or Critical. Enforced ONLY
      # on gated (release) calls — PR/weekly runs skip this and stay advisory.
      # FAILS CLOSED: if no SARIF is produced (path drift, skipped analysis) or it
      # is malformed, the gate errors rather than passing — a security gate must
      # never green a release it could not actually evaluate.
      # Caveat: this reads the freshly produced SARIF, which does NOT reflect alert
      # dismissals — a dismissed false positive re-blocks until the query is tuned
      # or excluded via the CodeQL config. [GITHUB-CODE-SCANNING]
      - name: Enforce no high/critical findings (release gate)
        if: inputs.gate
        shell: bash
        env:
          SARIF_DIR: sarif-results
          SEVERITY_THRESHOLD: '7.0'
        run: |-
          set -euo pipefail
          shopt -s nullglob
          # Fail closed: no SARIF means we cannot prove the code is clean.
          sarifs=( "${SARIF_DIR}"/*.sarif )
          if [ "${#sarifs[@]}" -eq 0 ]; then
            echo "::error::CodeQL gate: no SARIF in ${SARIF_DIR}; cannot verify findings — failing closed."
            exit 1
          fi
          offenders=0
          for sarif in "${sarifs[@]}"; do
            # Malformed SARIF -> fail closed.
            if ! jq -e '.runs' "${sarif}" >/dev/null 2>&1; then
              echo "::error::CodeQL gate: ${sarif} is not valid SARIF (no .runs) — failing closed."
              exit 1
            fi
            # Observability: prove real data was parsed. A clean scan logs
            # results=0 with a non-zero severity_rules count (rules carry the
            # security-severity that the gate keys on).
            jq -r --arg f "${sarif##*/}" '
              ([ (.runs[].tool.driver.rules // [])[],
                 (.runs[].tool.extensions[]?.rules // [])[] ]) as $rules
              | "CodeQL gate: \($f): results=\([.runs[].results[]?]|length) severity_rules=\([$rules[]|select(.properties["security-severity"])]|length)"
            ' "${sarif}"
            # Map ruleId -> security-severity. CodeQL puts query rules in
            # tool.extensions[].rules (driver.rules is empty in CodeQL output);
            # union both defensively, then keep results at/above threshold.
            hits="$(jq -r --argjson t "${SEVERITY_THRESHOLD}" '
              .runs[]
              | ( [ (.tool.driver.rules // [])[],
                    (.tool.extensions[]?.rules // [])[] ]
                  | map({ key: .id,
                          value: ((.properties["security-severity"] // "0") | tonumber) })
                  | from_entries
                ) as $severity
              | .results[]
              | select( ($severity[.ruleId] // 0) >= $t )
              | .ruleId
            ' "${sarif}" | sort | uniq -c | sort -rn)"
            if [ -n "${hits}" ]; then
              echo "::error::High/critical CodeQL findings in ${sarif}:"
              echo "${hits}"
              offenders=$((offenders + 1))
            fi
          done
          if [ "${offenders}" -gt 0 ]; then
            echo "::error::CodeQL gate failed — release blocked. Fix or dismiss-and-exclude the findings, then re-tag."
            exit 1
          fi
          echo "CodeQL gate passed: nothing at or above severity ${SEVERITY_THRESHOLD}."
