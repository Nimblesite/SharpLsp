name: CodeQL

# Static analysis for the TypeScript VS Code extension and the GitHub Actions
# workflows themselves. Both languages analyze without a build step, so this
# workflow stays fast and reliable. (.NET/Rust semantic engines are covered by
# their own strict lint/clippy gates in ci.yml.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly, so newly-published CodeQL queries re-scan even without a push.
    - cron: "27 4 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # TEMPORARY: code scanning (SARIF upload) requires GitHub Advanced Security
    # on PRIVATE repositories. SharpLsp is private until the go-public flip, so
    # the upload fails with "Code Security must be enabled for this repository".
    # Gate on public visibility so this self-enables the moment the repo is made
    # public — no follow-up edit needed. [TODO-GO-PUBLIC: confirm green once public]
    if: github.event.repository.visibility == 'public'
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, actions]
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        language: ${{ matrix.language }}
        queries: security-extended
    - name: Perform CodeQL analysis
      uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
      with:
        category: "/language:${{ matrix.language }}"
