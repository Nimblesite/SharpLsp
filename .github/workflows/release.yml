name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-vsix:
    name: Build VSIX (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            can_execute: true
          - platform: linux-arm64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-gnu
            can_execute: false
          - platform: darwin-arm64
            os: macos-15
            rust_target: aarch64-apple-darwin
            can_execute: true
          - platform: darwin-x64
            os: macos-13
            rust_target: x86_64-apple-darwin
            can_execute: true
          - platform: win32-x64
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            can_execute: true
          - platform: win32-arm64
            os: windows-latest
            rust_target: aarch64-pc-windows-msvc
            can_execute: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust_target }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install VS Code extension dependencies
        run: npm ci --prefix editors/vscode

      - name: Install Linux ARM64 cross linker
        if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
          echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Stamp versions
        shell: bash
        run: |
          perl -i -pe 's/^version = ".*"/version = "'"${VERSION}"'"/' Cargo.toml
          jq --arg v "$VERSION" '.version = $v' editors/vscode/package.json > /tmp/pkg.json
          mv /tmp/pkg.json editors/vscode/package.json

      - name: Package VSIX
        shell: bash
        run: make package-vsix-${{ matrix.platform }} RUST_TARGET=${{ matrix.rust_target }} VERSION="$VERSION"

      - name: Verify binary version
        if: ${{ matrix.can_execute }}
        shell: bash
        run: |
          set -euo pipefail
          exe=""
          if [ "${{ runner.os }}" = "Windows" ]; then exe=".exe"; fi
          "target/${{ matrix.rust_target }}/release/sharplsp${exe}" --version | grep -Fx "sharplsp ${VERSION}"

      - name: Verify VSIX contains all binaries
        shell: bash
        run: |
          set -euo pipefail
          exe=""
          if [ "${{ runner.os }}" = "Windows" ]; then exe=".exe"; fi
          unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" | grep -F "bin/${{ matrix.platform }}/sharplsp${exe}"
          unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" | grep -F "bin/all/sharplsp-sidecar-csharp"
          unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" | grep -F "bin/all/sharplsp-sidecar-fsharp"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix-${{ matrix.platform }}
          path: dist/*.vsix

  release:
    name: Create GitHub Release
    needs: build-vsix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "SharpLsp ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.vsix
