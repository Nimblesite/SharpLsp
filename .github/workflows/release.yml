---
name: Release
'on':
  push:
    tags:
    - v*
permissions:
  contents: write
env:
  CARGO_TERM_COLOR: always
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
jobs:
  prepare:
    name: Stamp Versions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: "${{ steps.version.outputs.version }}"
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Extract version from tag
      id: version
      shell: bash
      run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
    - name: Stamp all manifest versions
      run: make _stamp-version VERSION=${{ steps.version.outputs.version }}
    - name: Commit and push stamped versions
      shell: bash
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add \
          Cargo.toml \
          Cargo.lock \
          editors/vscode/package.json \
          editors/vscode/package-lock.json \
          editors/vscode/shipwright.json \
          shipwright.json \
          editors/zed/Cargo.toml \
          editors/zed/extension.toml
        git diff --cached --quiet || git commit -m "chore: stamp version ${{ steps.version.outputs.version }}"
        git push origin HEAD:refs/heads/main
    - uses: actions/upload-artifact@v4
      with:
        name: stamped-source
        path: |
          Cargo.toml
          Cargo.lock
          editors/vscode/package.json
          editors/vscode/package-lock.json
          editors/vscode/shipwright.json
          shipwright.json
          editors/zed/Cargo.toml
          editors/zed/extension.toml
  build-vsix:
    name: Build VSIX (${{ matrix.platform }})
    needs: prepare
    runs-on: "${{ matrix.os }}"
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: linux-x64
          os: ubuntu-latest
          rust_target: x86_64-unknown-linux-gnu
          can_execute: true
        - platform: linux-arm64
          os: ubuntu-latest
          rust_target: aarch64-unknown-linux-gnu
          can_execute: false
        - platform: darwin-arm64
          os: macos-15
          rust_target: aarch64-apple-darwin
          can_execute: true
        # This just spins forever on GitHub's hosted runners
        # - platform: darwin-x64
        #   os: macos-13
        #   rust_target: x86_64-apple-darwin
        #   can_execute: true
        - platform: win32-x64
          os: windows-latest
          rust_target: x86_64-pc-windows-msvc
          can_execute: true
        - platform: win32-arm64
          os: windows-latest
          rust_target: aarch64-pc-windows-msvc
          can_execute: false
    steps:
    - uses: actions/checkout@v4
    - name: Apply stamped versions
      uses: actions/download-artifact@v4
      with:
        name: stamped-source
        path: "."
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: "${{ matrix.rust_target }}"
    - uses: Swatinem/rust-cache@v2
      with:
        key: "${{ matrix.rust_target }}"
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: editors/vscode/package-lock.json
    - name: Install VS Code extension dependencies
      run: npm ci --prefix editors/vscode
    - name: Install Linux ARM64 cross linker
      if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
        echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"
    - name: Set platform variables
      shell: bash
      run: |
        exe=""
        if [ "${{ runner.os }}" = "Windows" ]; then exe=".exe"; fi
        echo "EXE=${exe}" >> "$GITHUB_ENV"
    - name: Package VSIX
      shell: bash
      run: make package-vsix-${{ matrix.platform }} RUST_TARGET=${{ matrix.rust_target }} VERSION="${{ needs.prepare.outputs.version }}"
    - name: Verify binary version
      if: "${{ matrix.can_execute }}"
      shell: bash
      run: |
        set -euo pipefail
        "target/${{ matrix.rust_target }}/release/sharplsp${EXE}" --version | grep -Fx "sharplsp ${{ needs.prepare.outputs.version }}"
    - name: Verify VSIX contains all binaries
      shell: bash
      run: |
        set -euo pipefail
        unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" | grep -F "bin/${{ matrix.platform }}/sharplsp${EXE}"
        unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" | grep -F "bin/all/sharplsp-sidecar-csharp"
        unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" | grep -F "bin/all/sharplsp-sidecar-fsharp"
    - uses: actions/upload-artifact@v4
      with:
        name: vsix-${{ matrix.platform }}
        path: dist/*.vsix
  release:
    name: Create GitHub Release
    needs: build-vsix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: vsix-*
        merge-multiple: true
    - name: Create GitHub release
      env:
        GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
      run: |
        gh release create "${{ github.ref_name }}" \
          --repo "${{ github.repository }}" \
          --title "SharpLsp ${{ github.ref_name }}" \
          --generate-notes \
          artifacts/*.vsix
