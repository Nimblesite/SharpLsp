name: Publish VSIX
'on':
  push:
    tags:
    - v*
permissions:
  contents: read
jobs:
  build:
    name: Build VSIX (${{ matrix.platform }})
    runs-on: "${{ matrix.os }}"
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
        - platform: darwin-arm64
          os: macos-15
          rust_target: aarch64-apple-darwin
          can_execute: true
        - platform: darwin-x64
          os: macos-13
          rust_target: x86_64-apple-darwin
          can_execute: true
        - platform: linux-x64
          os: ubuntu-latest
          rust_target: x86_64-unknown-linux-gnu
          can_execute: true
        - platform: linux-arm64
          os: ubuntu-latest
          rust_target: aarch64-unknown-linux-gnu
          can_execute: false
        - platform: win32-x64
          os: windows-latest
          rust_target: x86_64-pc-windows-msvc
          can_execute: true
        - platform: win32-arm64
          os: windows-latest
          rust_target: aarch64-pc-windows-msvc
          can_execute: false
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        targets: "${{ matrix.rust_target }}"
    - uses: Swatinem/rust-cache@v2
      with:
        key: "${{ matrix.rust_target }}"
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: editors/vscode/package-lock.json
    - name: Install Linux ARM64 cross linker
      if: matrix.rust_target == 'aarch64-unknown-linux-gnu'
      shell: bash
      run: |-
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu
        echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
        echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
        echo "AR_aarch64_unknown_linux_gnu=aarch64-linux-gnu-ar" >> "$GITHUB_ENV"
    - name: Install VS Code extension dependencies
      run: npm ci --prefix editors/vscode
    - name: Validate Shipwright manifest shape
      shell: bash
      run: |-
        set -euo pipefail
        node --input-type=module <<'NODE'
        import { readFile } from 'node:fs/promises';
        const manifest = JSON.parse(await readFile('shipwright.json', 'utf8'));
        const pkg = JSON.parse(await readFile('editors/vscode/package.json', 'utf8'));
        const props = pkg.contributes.configuration.properties;
        const lsp = manifest.components.find((component) => component.id === 'sharplsp');
        if (!lsp) throw new Error('sharplsp component missing');
        if (!lsp.sources.includes('bundled')) throw new Error('sharplsp bundled source missing');
        if (lsp.bundled?.bundlePath !== 'bin/${platform}/sharplsp${exe}') {
          throw new Error('unexpected sharplsp bundled bundlePath');
        }
        if (manifest.hosts?.vscode?.artifact !== 'vsix-per-platform') {
          throw new Error('vscode host must use vsix-per-platform artifact');
        }
        for (const component of manifest.components.filter((item) => item.userSetting)) {
          if (!props[component.userSetting]) throw new Error(`missing VS Code setting ${component.userSetting}`);
        }
        NODE
    - name: Extract version from tag
      shell: bash
      run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
    - name: Build sharplsp
      shell: bash
      run: cargo build --release --target "${{ matrix.rust_target }}"
    - name: Verify binary version
      if: "${{ matrix.can_execute }}"
      shell: bash
      run: |-
        set -euo pipefail
        exe=""
        if [ "${{ runner.os }}" = "Windows" ]; then exe=".exe"; fi
        binary="target/${{ matrix.rust_target }}/release/sharplsp${exe}"
        "$binary" --version | grep -Fx "sharplsp ${VERSION}"
    - name: Stage platform binary
      shell: bash
      run: |-
        set -euo pipefail
        exe=""
        if [ "${{ runner.os }}" = "Windows" ]; then exe=".exe"; fi
        rm -rf editors/vscode/bin
        mkdir -p "editors/vscode/bin/${{ matrix.platform }}"
        cp "target/${{ matrix.rust_target }}/release/sharplsp${exe}" \
          "editors/vscode/bin/${{ matrix.platform }}/sharplsp${exe}"
    - name: Package VSIX
      shell: bash
      run: |-
        set -euo pipefail
        mkdir -p dist
        cd editors/vscode
        npx @vscode/vsce package --no-dependencies --target "${{ matrix.platform }}" \
          -o "../../dist/sharplsp-${{ matrix.platform }}.vsix"
    - name: Verify VSIX contains platform binary
      shell: bash
      run: |-
        set -euo pipefail
        exe=""
        if [ "${{ runner.os }}" = "Windows" ]; then exe=".exe"; fi
        unzip -l "dist/sharplsp-${{ matrix.platform }}.vsix" \
          | grep -F "bin/${{ matrix.platform }}/sharplsp${exe}"
    - uses: actions/upload-artifact@v4
      with:
        name: vsix-${{ matrix.platform }}
        path: dist/*.vsix
  publish:
    name: Publish VSIX
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true
    - name: Publish to VS Code Marketplace
      shell: bash
      run: |-
        set -euo pipefail
        for vsix in dist/*.vsix; do
          npx @vscode/vsce publish --packagePath "$vsix"
        done
      env:
        VSCE_PAT: "${{ secrets.VSCE_PAT }}"
