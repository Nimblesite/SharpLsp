# agent-pmo:2efd847
name: PR

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('sidecars/**/*.csproj', 'sidecars/Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install dependencies
        run: |
          dotnet tool restore
          npm ci --prefix editors/vscode

      - name: Rust
        run: make lint-rust PROFILE=debug

      - name: Zed
        run: make lint-zed

      - name: .NET format
        run: dotnet csharpier check sidecars/

      - name: .NET lint
        run: make lint-dotnet

      - name: Sidecar dotnet pack (smoke test)
        run: |
          dotnet pack sidecars/Forge.Sidecar.CSharp/Forge.Sidecar.CSharp.csproj \
            -p:PackageVersion=0.0.0-ci -c Release -o /tmp/nupkg-smoke
          dotnet pack sidecars/Forge.Sidecar.FSharp/Forge.Sidecar.FSharp.fsproj \
            -p:PackageVersion=0.0.0-ci -c Release -o /tmp/nupkg-smoke
          ls -la /tmp/nupkg-smoke/*.nupkg

      - name: VS Code format
        run: cd editors/vscode && npx prettier@3 --check 'src/**/*.ts'

      - name: VS Code lint
        run: make lint-vsix

  test:
    name: Test
    needs: [lint]
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: Rust + .NET + VS Code E2E suites with coverage instrumentation
    # across 3 sidecars and xvfb-driven extension host exceed the 10-minute default.
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: taiki-e/install-action@nextest

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install diagnostic tools
        run: |
          dotnet tool install -g dotnet-trace &
          dotnet tool install -g dotnet-counters &
          dotnet tool install -g dotnet-dump &
          wait

      - name: Install VS Code extension deps
        run: npm ci --prefix editors/vscode

      - name: Test (build + coverage + threshold enforcement)
        run: make test-rust test-zed test-dotnet

      - name: Test VS Code extension (requires virtual display)
        run: xvfb-run -a make test-vsix

      - name: Commit ratcheted thresholds
        run: |
          git diff --quiet coverage-thresholds.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-thresholds.json
          git commit -m "ci: ratchet coverage threshold"
          git push
