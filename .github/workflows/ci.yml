  test:
    name: Test
    needs: [rust]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - uses: taiki-e/install-action@cargo-llvm-cov

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install diagnostic tools
        run: |
          dotnet tool install -g dotnet-trace
          dotnet tool install -g dotnet-counters
          dotnet tool install -g dotnet-dump

      - name: Install VS Code extension deps
        run: npm ci --prefix editors/vscode

      - name: Test (build + coverage + threshold enforcement)
        run: make test

      - name: Commit ratcheted thresholds
        run: |
          git diff --quiet coverage-thresholds.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage-thresholds.json
          git commit -m "ci: ratchet coverage threshold"
          git push
