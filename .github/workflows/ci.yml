---
name: PR
'on':
  pull_request:
    branches:
    - main
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
jobs:
  validate-manifest:
    name: Validate Shipwright Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '24'
    - name: Validate shipwright.json
      shell: bash
      run: |-
        set -euo pipefail
        tmp="$(mktemp -d)"
        npm install --prefix "$tmp" @nimblesite/shipwright-validate-manifest@0.9.0
        "$tmp/node_modules/.bin/shipwright-validate-manifest" \
          --schema .github/shipwright/deployment-toolkit.schema.json \
          shipwright.json editors/vscode/shipwright.json
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt
    - uses: Swatinem/rust-cache@v2
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.0.x
          10.0.x
    - uses: actions/cache@v4
      with:
        path: "~/.nuget/packages"
        key: "${{ runner.os }}-nuget-${{ hashFiles('sidecars/**/*.csproj', 'sidecars/Directory.Build.props') }}"
        restore-keys: "${{ runner.os }}-nuget-"
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: editors/vscode/package-lock.json
    - name: Install dependencies
      run: |
        dotnet tool restore
        npm ci --prefix editors/vscode
    - name: Lint (Rust)
      run: make _lint-rust PROFILE=debug
    - name: Lint (Zed)
      run: make _lint-zed
    - name: Format check (.NET)
      run: dotnet csharpier check sidecars/
    - name: Lint (.NET)
      run: make _lint-dotnet
    - name: Sidecar pack smoke test
      run: |
        dotnet pack sidecars/SharpLsp.Sidecar.CSharp/SharpLsp.Sidecar.CSharp.csproj \
          -p:PackageVersion=0.0.0-ci -c Release -o /tmp/nupkg-smoke
        dotnet pack sidecars/SharpLsp.Sidecar.FSharp/SharpLsp.Sidecar.FSharp.fsproj \
          -p:PackageVersion=0.0.0-ci -c Release -o /tmp/nupkg-smoke
        ls -la /tmp/nupkg-smoke/*.nupkg
    - name: Format check (VS Code)
      run: cd editors/vscode && npx prettier@3 --check 'src/**/*.ts'
    - name: Lint (VS Code)
      run: make _lint-vsix
  test-rust:
    name: Test Rust
    needs:
    - lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview
    - uses: Swatinem/rust-cache@v2
    - uses: taiki-e/install-action@cargo-llvm-cov
    - uses: taiki-e/install-action@nextest
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.0.x
          10.0.x
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install .NET diagnostic tools
      run: |
        dotnet tool install -g dotnet-trace
        dotnet tool install -g dotnet-counters
        dotnet tool install -g dotnet-dump
    - name: Test Rust with coverage
      run: make _test-rust
    - name: Build release binary
      run: cargo build --release --bin sharplsp
    - name: Verify sharplsp version contract
      shell: bash
      run: |-
        set -euo pipefail
        VERSION="$(cargo metadata --no-deps --format-version 1 | node -e 'const fs=require("node:fs"); const meta=JSON.parse(fs.readFileSync(0,"utf8")); const pkg=meta.packages.find((item)=>item.name==="sharplsp"); if(!pkg) throw new Error("sharplsp package missing"); process.stdout.write(pkg.version);')"
        ./target/release/sharplsp --version | grep -Fx "sharplsp ${VERSION}"
        ./target/release/sharplsp --version --json | VERSION="${VERSION}" node -e 'const fs=require("node:fs"); const actual=JSON.parse(fs.readFileSync(0,"utf8")); const expected={name:"sharplsp",version:process.env.VERSION,kind:"lsp",language:"rust",product:"sharplsp"}; for (const [key,value] of Object.entries(expected)) { if (actual[key] !== value) throw new Error(`${key}: expected ${value}, got ${actual[key]}`); }'
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-rust
        path: |
          target/coverage-rust.json
          coverage-thresholds.json
  test-dotnet:
    name: Test .NET
    needs:
    - lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.0.x
          10.0.x
    - name: Test .NET sidecars with coverage
      run: make _test-dotnet
    - name: Verify sidecar version flags
      shell: bash
      run: |-
        set -euo pipefail
        CS_VERSION="$(dotnet msbuild sidecars/SharpLsp.Sidecar.CSharp/SharpLsp.Sidecar.CSharp.csproj -getProperty:Version -nologo)"
        FS_VERSION="$(dotnet msbuild sidecars/SharpLsp.Sidecar.FSharp/SharpLsp.Sidecar.FSharp.fsproj -getProperty:Version -nologo)"
        target/sidecar-csharp/SharpLsp.Sidecar.CSharp --version | grep -Fx "sharplsp-sidecar-csharp ${CS_VERSION}"
        target/sidecar-fsharp/SharpLsp.Sidecar.FSharp --version | grep -Fx "sharplsp-sidecar-fsharp ${FS_VERSION}"
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-dotnet
        path: coverage-thresholds.json
  test-vsix:
    name: Test VS Code
    needs:
    - lint
    runs-on: ubuntu-latest
    # TIMEOUT EXCEPTION: this job builds the Rust binary + .NET sidecars,
    # installs .NET 9 + 10, downloads the VS Code test host, then runs the full
    # ~300-test e2e suite (many tests spin up the Roslyn/FCS sidecars and load
    # real solutions). 10 minutes is too tight for the end-to-end run.
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@v4
    - uses: dtolnay/rust-toolchain@stable
    - uses: Swatinem/rust-cache@v2
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          9.0.x
          10.0.x
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: npm
        cache-dependency-path: editors/vscode/package-lock.json
    - name: Install VS Code extension deps
      run: npm ci --prefix editors/vscode
    - name: Remove PATH-installed SharpLsp binaries
      shell: bash
      run: |-
        set -euo pipefail
        for binary in sharplsp sharplsp-sidecar-csharp sharplsp-sidecar-fsharp; do
          resolved="$(command -v "$binary" || true)"
          if [ -n "$resolved" ]; then
            rm -f "$resolved"
          fi
        done
    - name: Test VS Code extension with coverage
      run: env -u SHARPLSP_EXECUTABLE_PATH -u SHARPLSP_LSP_PATH -u SHARPLSP_BINARY_DIR xvfb-run -a make _test-vsix
    - name: Verify VSIX contains platform binary
      shell: bash
      run: |-
        set -euo pipefail
        platform="$(node -e 'process.stdout.write(`${process.platform}-${process.arch}`)')"
        unzip -l sharplsp.vsix | grep -F "bin/${platform}/sharplsp"
    - name: Upload coverage
      uses: actions/upload-artifact@v4
      with:
        name: coverage-vsix
        path: coverage-thresholds.json
  # NOTE: the former `coverage` job that git-committed+pushed ratcheted
  # thresholds was removed. On a pull_request, actions/checkout is a detached
  # HEAD, so `git push` failed the moment coverage changed — a latent red build,
  # and a direct push to a protected branch ([BRANCH-RULES]). Coverage is
  # already enforced inside `make test` (scripts/check-coverage.sh reads
  # coverage-thresholds.json and fails below threshold in each test-* job).
  # Thresholds ratchet via the reviewed PR diff, not a bot commit.
  # [COVERAGE-THRESHOLDS-JSON]
