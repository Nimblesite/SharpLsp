id = "sharplsp"
name = "SharpLsp"
description = "The open-source .NET Language Server — C# and F# intelligence for every editor. Zero licenses. Zero vendor lock-in."
version = "0.0.0"
schema_version = 1
authors = ["SharpLsp <sharplsp@users.noreply.github.com>"]
repository = "https://github.com/Nimblesite/SharpLsp"

[language_servers.sharplsp]
name = "SharpLsp"
languages = ["C#", "F#"]

[slash_commands.sharplsp-tree]
description = "Display the .NET solution tree: projects, dependencies, and references"
tooltip_text = "Parse a .sln or .slnx file and show its project structure"
requires_argument = true
